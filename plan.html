<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyager Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--card:#111827;--b:rgba(255,255,255,.07);--bh:rgba(255,255,255,.15);
  --gold:#c9a84c;--gl:#e4c97e;--gd:rgba(201,168,76,.15);
  --tx:#e8e4da;--mu:#9ca3af;--sf:#d1d5db;
  --ds:rgba(16,185,129,.18);--dsc:#6ee7b7;
  --de:rgba(239,68,68,.15);--dec:#fca5a5;
  --dm:rgba(79,142,247,.15);--dmc:#93b8f8;
  --r:16px;--rs:10px;--nh:64px
}
body.light{
  --bg:#f5f3ee;--card:#fff;--b:rgba(0,0,0,.1);--bh:rgba(0,0,0,.22);
  --tx:#111827;--mu:#4b5563;--sf:#1f2937;--gd:rgba(201,168,76,.14);
  --ds:rgba(16,185,129,.35);--dsc:#064e3b;
  --de:rgba(239,68,68,.3);--dec:#7f1d1d;
  --dm:rgba(79,142,247,.3);--dmc:#1e3a8a;
}
body.light .day.ds{background:var(--ds);color:var(--dsc);font-weight:500}
body.light .day.de{background:var(--de);color:var(--dec);font-weight:500}
body.light .day.dm{background:var(--dm);color:var(--dmc)}
 
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 14%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 60%,rgba(255,255,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 45%,rgba(255,255,255,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 8% 75%,rgba(255,255,255,.3) 0%,transparent 100%)}
body.light::before{background-image:
  radial-gradient(1px 1px at 15% 20%,rgba(0,0,0,.07) 0%,transparent 100%),
  radial-gradient(1px 1px at 72% 14%,rgba(0,0,0,.05) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 38% 60%,rgba(0,0,0,.04) 0%,transparent 100%)}
 
/* ── NAV (shared between home-nav and app nav) ── */
nav,.home-nav{position:fixed;top:0;left:0;right:0;height:var(--nh);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(7,9,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--b);z-index:100;transition:background .3s}
body.light nav,body.light .home-nav{background:rgba(245,243,238,.93)}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:var(--gl);cursor:pointer}
body.light .logo{color:#92671a}
.logo span{color:var(--gold)}
 
/* ── TABS & DARK MODE BTN ── */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:30px;padding:4px}
body.light .tabs{background:rgba(0,0,0,.05)}
.tabs button{background:transparent;border:none;color:var(--mu);padding:7px 20px;border-radius:24px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:.2s}
.tabs button:hover{color:var(--tx)}
.tabs button.active{background:var(--gold);color:#07090f}
.dm-btn{width:34px;height:34px;background:rgba(255,255,255,.06);border:1px solid var(--b);border-radius:50%;cursor:pointer;color:var(--sf);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
body.light .dm-btn{background:rgba(0,0,0,.05)}
.dm-btn:hover{background:var(--gd);border-color:rgba(201,168,76,.4);color:var(--gl)}
 
/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg)}
#auth-screen.hidden{display:none}
.auth-box{width:100%;max-width:420px;padding:24px;animation:up .4s ease}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:var(--gl);text-align:center;margin-bottom:4px}
body.light .auth-logo{color:#92671a}
.auth-logo span{color:var(--gold)}
.auth-sub{text-align:center;font-size:12px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.auth-card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:32px}
.auth-tabs{display:flex;margin-bottom:28px;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:30px;padding:4px}
body.light .auth-tabs{background:rgba(0,0,0,.05)}
.auth-tab{flex:1;background:transparent;border:none;color:var(--mu);padding:8px;border-radius:24px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:.2s}
.auth-tab.active{background:var(--gold);color:#07090f}
.auth-f{margin-bottom:16px}
.auth-f label{display:block;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.auth-f input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:var(--rs);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 15px;outline:none;transition:.2s}
body.light .auth-f input{background:rgba(0,0,0,.04)}
.auth-f input:focus{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.04)}
.rem-row{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.rem-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--gold);cursor:pointer}
.rem-row label{font-size:13px;color:var(--mu);cursor:pointer;font-weight:400;margin:0}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#a8772a);border:none;border-radius:var(--rs);color:#07090f;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s}
.auth-btn:hover{opacity:.9}
.auth-err{font-size:12px;color:#f87171;margin-bottom:12px;text-align:center;min-height:16px}
 
/* ── HOME ── */
#home-screen{display:none}
#home-screen.on{display:block}
.home-nav-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:30px;padding:5px 14px 5px 5px}
body.light .user-chip{background:rgba(0,0,0,.05)}
.user-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#a8772a);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#07090f}
.user-name{font-size:13px;color:var(--sf)}
.logout-btn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);color:#f87171;font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;transition:.2s}
.logout-btn:hover{background:rgba(239,68,68,.15)}
.home-wrap,.wrap{max-width:700px;margin:0 auto;padding:calc(var(--nh) + 40px) 24px 80px}
.home-hero{margin-bottom:48px}
.home-hero h1{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--gl);letter-spacing:1px;margin-bottom:8px}
body.light .home-hero h1{color:#92671a}
.home-hero p{font-size:14px;color:var(--mu);max-width:400px;line-height:1.7}
.home-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
@media(max-width:500px){.home-cards{grid-template-columns:1fr}}
.hc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:24px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.hc::before,.tc::before,.trip-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.hc::before{background:linear-gradient(180deg,var(--gold),var(--gd))}
.hc:hover{border-color:rgba(201,168,76,.3);transform:translateY(-2px)}
.hc-icon{font-size:28px;margin-bottom:10px}
.hc-t{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--tx);margin-bottom:4px}
.hc-s{font-size:12px;color:var(--mu)}
.home-stat-row{display:flex;gap:12px}
.hstat{flex:1;background:var(--card);border:1px solid var(--b);border-radius:var(--rs);padding:16px;text-align:center}
.hstat-n{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--gl)}
body.light .hstat-n{color:#92671a}
.hstat-l{font-size:10px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
 
/* ── APP LAYOUT ── */
#app-screen{display:none}
#app-screen.on{display:block}
.view{display:none;animation:up .35s ease}
.view.on{display:block}
.ph{margin-bottom:36px}
.ph h1{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--gl);letter-spacing:1px;margin-bottom:6px}
body.light .ph h1{color:#92671a}
.ph p{font-size:13px;color:var(--mu)}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:28px}
.row{display:flex;gap:16px;margin-bottom:20px}
.row .f{flex:1;margin:0}
.f{margin-bottom:20px}
 
/* ── FORM ELEMENTS ── */
label{display:block;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
input[type=text],input[type=date]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:var(--rs);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 15px;outline:none;transition:.2s;appearance:none}
body.light input[type=text],body.light input[type=date]{background:rgba(0,0,0,.04)}
input:hover{border-color:var(--bh)}
input:focus{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.04)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4);cursor:pointer}
body.light input[type=date]::-webkit-calendar-picker-indicator{filter:none;opacity:.5}
 
/* ── SECTION LABEL ── */
.sl{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:12px;margin-bottom:12px}
.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.3),transparent)}
 
/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{padding:8px 15px;background:rgba(255,255,255,.03);border:1px solid var(--b);border-radius:30px;cursor:pointer;font-size:13px;color:var(--sf);transition:.2s;user-select:none}
body.light .chip{background:rgba(0,0,0,.04);color:#374151}
.chip:hover{border-color:rgba(201,168,76,.4);color:var(--tx)}
.chip.on{background:var(--gd);border-color:rgba(201,168,76,.6);color:var(--gl)}
body.light .chip.on{color:#7a5c10}
 
/* ── BUTTONS ── */
.add-row{display:flex;gap:10px;margin-bottom:20px}
.btn-sm,.btn-pdf{background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:var(--rs);color:var(--sf);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-sm{padding:0 18px}
.btn-pdf{padding:15px 20px;font-weight:500}
body.light .btn-sm,body.light .btn-pdf{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.15);color:#374151}
.btn-sm:hover,.btn-pdf:hover{background:var(--gd);border-color:rgba(201,168,76,.4);color:var(--gl)}
body.light .btn-sm:hover,body.light .btn-pdf:hover{color:#7a5c10}
.btn-row{display:flex;gap:10px}
.btn-save{flex:1;padding:15px;background:linear-gradient(135deg,var(--gold),#a8772a);border:none;border-radius:var(--rs);color:#07090f;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-save:hover{opacity:.9}
.btn-save:active{transform:scale(.99)}
 
/* ── PROGRESS BAR ── */
.prog-wrap{margin-bottom:20px}
.prog-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu)}
.prog-count{font-size:13px;color:var(--gold);font-weight:500}
body.light .prog-count{color:#92671a}
.prog-bar-bg{height:6px;background:rgba(255,255,255,.06);border-radius:10px;border:1px solid var(--b);overflow:hidden}
body.light .prog-bar-bg{background:rgba(0,0,0,.08)}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gl));border-radius:10px;transition:width .5s cubic-bezier(.25,1,.5,1);position:relative;overflow:hidden}
.prog-bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:shimmer 2s infinite ease-in-out}
 
/* ── PACKING LIST ── */
.list{background:rgba(0,0,0,.25);border:1px solid var(--b);border-radius:var(--rs);max-height:300px;overflow-y:auto;padding:4px 0;margin-bottom:20px}
body.light .list{background:rgba(0,0,0,.03)}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.li{display:flex;align-items:center;gap:13px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
body.light .li{border-bottom-color:rgba(0,0,0,.06)}
.li:last-child{border:none}
.li:hover{background:rgba(255,255,255,.03)}
body.light .li:hover{background:rgba(0,0,0,.03)}
.li input[type=checkbox]{width:16px;height:16px;min-width:16px;accent-color:var(--gold);cursor:pointer}
.li input[type=checkbox].bouncing{animation:cb-bounce .35s cubic-bezier(.36,.07,.19,.97)}
.li span{font-size:13px;color:var(--sf);flex:1}
body.light .li span{color:#1f2937}
.li input:checked+span{color:var(--mu);text-decoration:line-through}
body.light .li input:checked+span{color:#9ca3af}
.li.removing{animation:li-out .32s ease forwards}
.li-remove{width:22px;height:22px;min-width:22px;border-radius:50%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#f87171;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:.2s;flex-shrink:0}
.li:hover .li-remove{opacity:1}
.li-remove:hover{background:rgba(239,68,68,.2)!important;border-color:rgba(239,68,68,.5)!important}
.empty{padding:28px;text-align:center;color:var(--mu);font-size:13px}
 
/* ── CALENDAR ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-m{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--gl)}
body.light .cal-m{color:#111827}
.cal-btns{display:flex;gap:8px}
.cal-btn{width:34px;height:34px;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:50%;cursor:pointer;color:var(--sf);font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
body.light .cal-btn{background:rgba(0,0,0,.05);color:#374151}
.cal-btn:hover{background:var(--gd);border-color:rgba(201,168,76,.4);color:var(--gl)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mu);padding:7px 0}
.day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;color:var(--sf);background:rgba(255,255,255,.03);border:1px solid transparent;position:relative;cursor:default;padding:2px;gap:2px}
body.light .day{color:#4b5563;background:rgba(0,0,0,.02)}
.day-num{font-size:13px;line-height:1}
.day-label{font-size:8px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;color:inherit;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;text-align:center;line-height:1.1}
.day.other{color:rgba(255,255,255,.15)}
body.light .day.other{color:rgba(0,0,0,.22)}
.day.today{border-color:rgba(201,168,76,.4);color:var(--gl)}
body.light .day.today{color:#7a5c10}
.day.ds{background:var(--ds);color:var(--dsc);font-weight:500}
.day.de{background:var(--de);color:var(--dec);font-weight:500}
.day.dm{background:var(--dm);color:var(--dmc)}
.day.has-trip{cursor:pointer}
.day.has-trip:hover{filter:brightness(1.15);transform:scale(1.06);z-index:2;transition:transform .15s,filter .15s}
.leg{display:flex;gap:18px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu)}
.dot{width:9px;height:9px;border-radius:50%}
 
/* ── CAL TOOLTIP ── */
.cal-tip{position:fixed;z-index:999;background:var(--card);border:1px solid rgba(201,168,76,.4);border-radius:10px;padding:12px 16px;min-width:200px;max-width:260px;pointer-events:none;opacity:0;transform:translateY(6px);transition:opacity .18s,transform .18s;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.cal-tip.show{opacity:1;transform:translateY(0)}
.cal-tip-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gl);margin-bottom:4px}
body.light .cal-tip-name{color:#92671a}
.cal-tip-dates{font-size:11px;color:var(--mu);margin-bottom:6px}
.cal-tip-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500}
.cal-tip-badge.dep{background:var(--ds);color:var(--dsc)}
.cal-tip-badge.mid{background:var(--dm);color:var(--dmc)}
.cal-tip-badge.ret{background:var(--de);color:var(--dec)}
 
/* ── TRIP CARDS ── */
.tc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:20px 24px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s,transform .2s,opacity .4s;position:relative;overflow:hidden}
.tc::before{background:linear-gradient(180deg,var(--gold),var(--gd))}
.tc:hover{border-color:rgba(201,168,76,.25);transform:translateY(-1px)}
.tc.shaking{animation:tc-shake .4s ease}
.tc.gone{transform:translateX(60px)!important;opacity:0;pointer-events:none}
.tn{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--tx);margin-bottom:3px}
.td{font-size:12px;color:var(--mu)}
.tt{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.ttag{font-size:10px;padding:3px 9px;background:var(--gd);border:1px solid rgba(201,168,76,.25);border-radius:20px;color:var(--gold)}
body.light .ttag{color:#7a5c10}
.acts{display:flex;gap:8px;flex-shrink:0}
.be,.bd{padding:7px 13px;border-radius:var(--rs);border:1px solid var(--b);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
.be{background:rgba(79,142,247,.08);color:#7db3fa;border-color:rgba(79,142,247,.2)}
.be:hover{background:rgba(79,142,247,.15)}
.bd{background:rgba(239,68,68,.06);color:#f87171;border-color:rgba(239,68,68,.2)}
.bd:hover{background:rgba(239,68,68,.12)}
.badge{display:inline-flex;align-items:center;background:var(--gd);border:1px solid rgba(201,168,76,.3);border-radius:20px;color:var(--gold);font-size:11px;padding:2px 10px;margin-left:10px;vertical-align:middle}
body.light .badge{color:#92671a}
.es{text-align:center;padding:56px 24px;color:var(--mu)}
.es p{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--sf);margin-bottom:6px}
body.light .es p{color:#374151}
.countdown{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--gold);margin-top:6px}
body.light .countdown{color:#92671a}
.countdown.active{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#6ee7b7}
body.light .countdown.active{color:#065f46}
.countdown.past{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#f87171}
body.light .countdown.past{color:#991b1b}
 
/* ── TRIP LIST (CALENDAR PAGE) ── */
.trip-list-section{margin-top:24px}
.trip-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--b);border-radius:var(--rs);margin-bottom:8px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.trip-row.upcoming::before{background:linear-gradient(180deg,var(--dsc),transparent)}
.trip-row.active::before{background:linear-gradient(180deg,#6ee7b7,transparent)}
.trip-row.past::before{background:linear-gradient(180deg,#f87171,transparent)}
.trip-row:hover{border-color:rgba(201,168,76,.3);transform:translateX(3px)}
.trip-row-icon{font-size:20px;flex-shrink:0}
.trip-row-info{flex:1;min-width:0}
.trip-row-name{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trip-row-dates{font-size:11px;color:var(--mu);margin-top:2px}
.trip-row-status{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
.trip-row-status.upcoming{background:var(--ds);color:var(--dsc)}
.trip-row-status.active{background:rgba(16,185,129,.2);color:#6ee7b7}
.trip-row-status.past{background:rgba(239,68,68,.1);color:#fca5a5}
body.light .trip-row-status.active{color:#065f46}
body.light .trip-row-status.past{color:#7f1d1d}
 
/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#161e2e;border:1px solid rgba(201,168,76,.4);border-radius:30px;padding:11px 22px;font-size:13px;color:var(--gl);opacity:0;pointer-events:none;transition:.3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
 
/* ── ANIMATIONS ── */
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{left:-100%}100%{left:150%}}
@keyframes cb-bounce{0%,100%{transform:scale(1)}35%{transform:scale(1.35)}65%{transform:scale(.88)}}
@keyframes tc-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(9px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
@keyframes li-out{to{transform:translateX(28px);opacity:0;max-height:0;padding:0;margin:0}}
 
/* ── RESPONSIVE ── */
@media(max-width:580px){
  nav,.home-nav{padding:0 16px}
  .tabs button{padding:6px 10px;font-size:12px}
  .row{flex-direction:column}
  .tc{flex-direction:column;align-items:flex-start;gap:12px}
  .acts{width:100%}
  .be,.bd{flex:1;text-align:center}
  .btn-row{flex-direction:column}
  .home-nav-right{gap:6px}
  .user-name{display:none}
}
</style>
</head><body>

<div id="app-screen" class="on">
  <nav>
    <div class="logo" onclick="window.location.href='home.html'" style="cursor:pointer">V<span>o</span>yager</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="tabs">
        <button onclick="window.location.href='calendar.html'">Calendar</button>
        <button class="active" onclick="window.location.href='plan.html'">Plan</button>
        <button onclick="window.location.href='trips.html'">Trips</button>
      </div>
      <button class="dm-btn" onclick="toggleDark()" title="Toggle light/dark">&#x1F319;</button>
    </div>
  </nav>
  <main>
    <section id="v-plan" class="view on">
      <div class="wrap">
        <div class="ph"><h1 id="ph-title">New Adventure</h1><p id="ph-sub">Fill in the details below</p></div>
        <div class="card">
          <div class="f"><label>Trip Name</label><input type="text" id="t-name" placeholder="Swiss Alps, Tokyo Spring&#x2026;"></div>
          <div class="row">
            <div class="f"><label>Departure</label><input type="date" id="t-start"></div>
            <div class="f"><label>Return</label><input type="date" id="t-end"></div>
          </div>
          <div class="sl">Activities</div>
          <div class="chips" id="chips"></div>
          <div class="sl">Custom Items</div>
          <div class="add-row">
            <input type="text" id="ci" placeholder="Inhaler, Drone, Special Medication&#x2026;">
            <button class="btn-sm" onclick="addCustom()">+ Add</button>
          </div>
          <div class="sl">Packing List</div>
          <div class="prog-wrap">
            <div class="prog-header">
              <span class="prog-label">Packed</span>
              <span class="prog-count" id="prog-count">0 / 0 items</span>
            </div>
            <div class="prog-bar-bg"><div class="prog-bar-fill" id="prog-fill" style="width:0%"></div></div>
          </div>
          <div class="list" id="list"></div>
          <div class="btn-row">
            <button class="btn-save" onclick="save()">Save Journey</button>
            <button class="btn-pdf" onclick="exportPDF()">&#x2B07; Export PDF</button>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const pad=n=>String(n).padStart(2,'0');
const fmt=s=>{if(!s)return'';const[y,m,d]=s.split('-');return(+d)+' '+MONTHS[+m-1].slice(0,3)+' '+y};
const getUsers=()=>{try{return JSON.parse(localStorage.getItem('voy-users')||'{}')}catch{return{}}};
const setUsers=u=>localStorage.setItem('voy-users',JSON.stringify(u));
const getCurrentUser=()=>{try{return JSON.parse(localStorage.getItem('voy-session')||'null')}catch{return null}};
const getTripKey=()=>'voy-trips-'+(getCurrentUser()?.email||'');
const getTrips=()=>{try{return JSON.parse(localStorage.getItem(getTripKey())||'[]')}catch{return[]}};
const setTrips=t=>localStorage.setItem(getTripKey(),JSON.stringify(t));
function requireAuth(){const u=getCurrentUser();if(!u){window.location.href='index.html';return null;}return u;}
function initTheme(){
  const L=localStorage.getItem('voy-theme')==='light';
  if(L)document.body.classList.add('light');
  document.querySelectorAll('.dm-btn').forEach(b=>b.textContent=L?'🌙':'☀️');
}
function toggleDark(){
  const L=document.body.classList.toggle('light');
  document.querySelectorAll('.dm-btn').forEach(b=>b.textContent=L?'🌙':'☀️');
  localStorage.setItem('voy-theme',L?'light':'dark');
}
function toast(msg){
  const e=document.getElementById('toast');if(!e)return;
  e.textContent=msg;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2600);
}
</script>
<script>
const ACT=[
  {k:'Beach',l:'Beach',i:'🏖️'},{k:'Hiking',l:'Hiking',i:'⛰️'},{k:'City',l:'City',i:'🏙️'},
  {k:'Camping',l:'Camping',i:'⛺'},{k:'Formal',l:'Formal',i:'👔'},{k:'Photo',l:'Photography',i:'📷'},
  {k:'Winter',l:'Winter Sports',i:'❄️'},{k:'Gym',l:'Fitness',i:'💪'},{k:'Work',l:'Work / Remote',i:'💼'},
  {k:'Water',l:'Water Sports',i:'🚣'},{k:'Cycling',l:'Cycling',i:'🚲'},{k:'Tropical',l:'Tropical',i:'🌴'},
];
const ESS=['Passport / ID','Wallet & Cash','Phone & Charger','Toiletries Bag','Underwear & Socks','Toothbrush & Paste','Deodorant','First Aid Kit'];
const PRE={
  Beach:['Swimsuit','Sunscreen SPF 50+','Beach Towel','Flip Flops','Sunglasses','Dry Bag','Wide-brimmed Hat'],
  Hiking:['Hiking Boots','Water Bladder','Daypack','Bug Spray','Energy Bars','Trekking Poles'],
  City:['Comfortable Walking Shoes','Power Bank','Small Daypack','Rain Jacket','Anti-theft Bag'],
  Camping:['Sleeping Bag','Tent & Stakes','Headlamp','Lighter','Portable Stove','Camping Chair'],
  Formal:['Dress Shirt / Blouse','Suit / Evening Dress','Dress Shoes','Tie / Cufflinks','Lint Roller'],
  Photo:['Camera Body','Extra Lenses','SD Cards','Tripod','Lens Cleaning Kit','Spare Batteries'],
  Winter:['Thermal Layers','Ski Jacket & Pants','Goggles','Insulated Gloves','Beanie','Neck Warmer'],
  Gym:['Workout Clothes','Training Shoes','Protein Shaker','Sweat Towel','Earbuds'],
  Work:['Laptop & Charger','Portable Mouse','Noise-cancelling Headphones','Notebook','Universal Adapter'],
  Water:['Wetsuit / Rash Guard','Water Shoes','Goggles / Snorkel','Waterproof Watch','Life Vest'],
  Cycling:['Helmet','Cycling Shorts','Bike Pump','Multi-tool','Cycling Gloves','Reflective Gear'],
  Tropical:['Rain Poncho','Mosquito Net','Quick-dry Clothes','Water Purification Tablets','Binoculars'],
};
let sel=[],custom=[],editId=null,removed=[],checked=[];
const esc=s=>s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

window.addEventListener('DOMContentLoaded',()=>{
  initTheme(); requireAuth();
  const editRaw=localStorage.getItem('voy-edit');
  if(editRaw){
    localStorage.removeItem('voy-edit');
    const t=JSON.parse(editRaw);
    editId=t.id;
    document.getElementById('t-name').value=t.n;
    document.getElementById('t-start').value=t.s;
    document.getElementById('t-end').value=t.e;
    sel=[...(t.a||[])]; custom=[...(t.c||[])]; removed=[...(t.rm||[])]; checked=[...(t.ck||[])];
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('ph-title').textContent='Edit Journey';
    document.getElementById('ph-sub').textContent=(t.s<=today)?'Trip in progress — update your packing list':'Update your trip details';
  }
  buildChips(); buildList();
  document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});
});

function buildChips(){
  document.getElementById('chips').innerHTML=ACT.map(a=>'<div class="chip" id="c-'+a.k+'" onclick="tog(\''+a.k+'\')">'+a.i+' '+a.l+'</div>').join('');
  syncChips();
}
function tog(k){
  const wasOn=sel.includes(k);
  wasOn?sel=sel.filter(x=>x!==k):sel.push(k);
  syncChips(); buildList();
  toast((wasOn?'✦ ':'✦ ')+(ACT.find(a=>a.k===k)?.l||k)+' items '+(wasOn?'removed':'added'));
}
function syncChips(){
  ACT.forEach(a=>{const e=document.getElementById('c-'+a.k);if(e)e.classList.toggle('on',sel.includes(a.k));});
}
function addCustom(){
  const inp=document.getElementById('ci'),v=inp.value.trim();
  if(!v)return;
  if(custom.includes(v)||[...ESS,...sel.flatMap(k=>PRE[k]||[])].includes(v))return toast('⚠ Already in list');
  custom.push(v); buildList(); toast('✦ "'+v+'" added'); inp.value=''; inp.focus();
}
function removeItem(name){
  const li=[...document.querySelectorAll('#list .li')].find(l=>l.querySelector('span')?.textContent===name);
  const doRemove=()=>{removed.push(name);checked=checked.filter(x=>x!==name);buildList();toast('✦ "'+name+'" removed');};
  if(li){li.classList.add('removing');setTimeout(doRemove,320);}else doRemove();
}
function getCurrentItems(){
  return[...new Set([...ESS,...sel.flatMap(k=>PRE[k]||[]),...custom])].filter(x=>!removed.includes(x));
}
function updateProgress(){
  const items=getCurrentItems(),total=items.length;
  const done=checked.filter(x=>items.includes(x)).length;
  document.getElementById('prog-count').textContent=done+' / '+total+' items';
  document.getElementById('prog-fill').style.width=(total?Math.round(done/total*100):0)+'%';
}
function buildList(){
  const items=getCurrentItems();const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<div class="empty">Select activities or add custom items above</div>';updateProgress();return;}
  el.innerHTML=items.map(x=>'<label class="li"><input type="checkbox" '+(checked.includes(x)?'checked':'')+' onchange="toggleCheck(\''+esc(x)+'\',this.checked)"><span>'+x+'</span><button class="li-remove" onclick="removeItem(\''+esc(x)+'\');event.preventDefault()">✕</button></label>').join('');
  updateProgress();
}
function toggleCheck(name,val){
  if(val){if(!checked.includes(name))checked.push(name);toast('✓ "'+name+'" packed');}
  else{checked=checked.filter(x=>x!==name);toast('✦ "'+name+'" unpacked');}
  updateProgress();
}
function save(){
  const n=document.getElementById('t-name').value.trim();
  const s=document.getElementById('t-start').value;
  const e=document.getElementById('t-end').value;
  if(!n||!s||!e)return toast('⚠ Please fill in all fields');
  const today=new Date().toISOString().split('T')[0];
  const sT=new Date(s).getTime(),eT=new Date(e).getTime(),todayT=new Date(today).getTime();
  if(eT<sT)return toast('⚠ Return must be after departure');
  if(!editId&&sT<todayT)return toast('⚠ Departure date is in the past');
  const trips=getTrips();
  const ov=trips.find(t=>t.id!==editId&&sT<=new Date(t.e).getTime()&&eT>=new Date(t.s).getTime());
  if(ov)return toast('⚠ Dates overlap with "'+ov.n+'"');
  const trip={id:editId||Date.now(),n,s,e,a:[...sel],c:[...custom],rm:[...removed],ck:[...checked]};
  setTrips(editId?trips.map(t=>t.id===editId?trip:t):[...trips,trip]);
  localStorage.removeItem('voy-edit');
  toast(editId?'✓ Journey updated':'✓ Journey saved');
  setTimeout(()=>{window.location.href='trips.html';},800);
}
function exportPDF(){
  const name=document.getElementById('t-name').value.trim()||'My Trip';
  const start=document.getElementById('t-start').value,end=document.getElementById('t-end').value;
  const items=getCurrentItems(),total=items.length;
  const done=checked.filter(x=>items.includes(x)).length;
  const pct=total?Math.round(done/total*100):0;
  const win=window.open('','_blank');
  if(!win)return toast('⚠ Allow popups to export PDF');
  const pdfCSS='*{box-sizing:border-box;margin:0;padding:0}body{font-family:Helvetica,sans-serif;background:#fff;color:#111;padding:40px;max-width:680px;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}h1{font-family:Georgia,serif;font-size:32px;font-weight:400;color:#c9a84c;margin-bottom:4px}.sub{font-size:13px;color:#6b7280;margin-bottom:28px}.pr{display:flex;justify-content:space-between;margin-bottom:6px}.pl{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280}.pc{font-size:13px;color:#c9a84c;font-weight:500}.pb{height:6px;background:#f0f0f0;border-radius:10px;margin-bottom:24px;overflow:hidden}.pf{height:100%;background:linear-gradient(90deg,#c9a84c,#e4c97e)}.item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f3f4f6}.item:last-child{border:none}.box{width:16px;height:16px;border:2px solid #c9a84c;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.box.chk{background:#c9a84c}.ck{color:#fff;font-size:11px;font-weight:700}.nm{font-size:13px}.done{color:#9ca3af;text-decoration:line-through}.foot{margin-top:24px;font-size:11px;color:#9ca3af;text-align:right}';
  const rows=items.map(function(x){var c=checked.includes(x);return '<div class="item"><div class="box'+(c?' chk':'')+'">'+( c?'<span class="ck">&#x2713;</span>':'')+'</div><span class="nm'+(c?' done':'')+'">'+x+'</span></div>';}).join('');
  var doc='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+name+' Packing List</title>';
  doc+='<style>'+pdfCSS+'<\/style><\/head><body>';
  doc+='<h1>'+name+'<\/h1>';
  doc+='<div class="sub">'+(fmt(start)||'-')+' to '+(fmt(end)||'-')+'<\/div>';
  doc+='<div class="pr"><span class="pl">Packed<\/span><span class="pc">'+done+' / '+total+' ('+pct+'%)<\/span><\/div>';
  doc+='<div class="pb"><div class="pf" style="width:'+pct+'%"><\/div><\/div>';
  doc+=rows;
  doc+='<div class="foot">Exported from Voyager<\/div>';
  doc+='<scr'+'ipt>window.onload=function(){window.print()};<\/scr'+'ipt>';
  doc+='<\/body><\/html>';
  win.document.write(doc);
  win.document.close();
}
</script>
</body>
</html>
